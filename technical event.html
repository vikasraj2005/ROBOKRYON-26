<!DOCTYPE html>

<head>

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Audiowide&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
        <link rel="preconnect" href="https://fonts.googleapis.com">

        <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
    <title>Technical Event💡</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background-color: black;
            color: whitesmoke;
            margin: 0;


            font-family: "Poppins", sans-serif;
            font-weight: 200;
            font-style: normal;
        }

        /* moving particle */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;

            pointer-events: none;
        }

        .event-1 {
            border: 1px solid #ff3b5c;
            box-shadow: 0 0 10px #ff3b5c;
            border-radius: 30px;
            width: min(700px, calc(100vw - 32px));
            height: auto;
            text-align: center;
            margin: 20px auto;
            padding: 30px;
        }

        .event-2 {
            border: 1px solid #ff3b5c;
            box-shadow: 0 0 10px #ff3b5c;
            border-radius: 30px;
            width: min(700px, calc(100vw - 32px));
            height: auto;
            text-align: center;
            margin: 50px auto;
            padding: 30px;
        }

        .event-3 {
            border: 1px solid #ff3b5c;
            box-shadow: 0 0 10px #ff3b5c;
            border-radius: 30px;
            width: min(700px, calc(100vw - 32px));
            height: auto;
            text-align: center;
            margin: 50px auto;
            padding: 30px;
        }

      

        .register {
            padding: 0.5rem 1.5rem;
            cursor: pointer;
            border: none;
            border-radius: 30px;
            transition: 0.3s;
            box-shadow: 0 0 15px #ff3b5c;
            background-color: #ff3b5c;
            color: whitesmoke;
            font-size: 1rem;
            font-weight: 600;
            margin: 20px;
        }

        img {
            width: 100%;
            max-width: 700px;
            height: auto;
            display: block;
            margin: 0 auto;
        }
        span{
            color: #ff3b5c;
        }
        .event-1 button:hover{
            transform: scale(1.05);
        }
        .event-2 button:hover{
            transform: scale(1.05);
        }
        .event-3 button:hover{
            transform: scale(1.05);
        }
        h3{
            font-family: "Audiowide", sans-serif;
         font-weight: 400;
         font-style: normal;
        }
        @media(max-width:768px){
            .event-1,
            .event-2,
            .event-3 {
                padding: 18px;
                margin: 18px auto;
                border-radius: 22px;
                width: calc(100% - 32px);
            }
        }
    </style>
</head>

<body>
    <!--moving particles-->
    <div class="part">
        <canvas id="particles"></canvas>
    </div>
    <H1 style="text-align: center; padding: 50px; font-size: 50px;" >TECHNICAL EVENT</H1>
    <!--event 1-->
    <div class="event-1">




        <h3 style="font-size: 50px; gap: 1px;">PROTOTYPE <span>EXPO</span></h3>
        <p style="font-size: 20px;">Design the fastest robot and compete on a racing track.</p>
        <img src="image/project.jpg">
      <a href="prototype expo.html" target="_blank">  <button class="register">REGISTER NOW</button></a>
    </div>

    <!--event 2-->
    <div class="event-2">



        <h3 style="font-size: 40px; gap: 1px;">IDEA <span class="span">PRESENTATION</span></h3>
        <p style="font-size: 20px;">
            Robots compete to score goals in an exciting soccer match.
        </p>
        <img src="image/paper.jpg">
       <a href="idea presentation.html" target="_blank"> <button class="register">REGISTER NOW</button></a>
    </div>



    <!--event 3-->


    <h1 style="text-align: center; padding: 50px; font-size: 50px;">NON-TECHNICAL EVENT</h1>
    <div class="event-3">


        <h3 style="font-size: 50px; gap: 1px;">IPL <span>AUCTION</span></h3>
        <p style="font-size: 20px;">
            Autonomous robot that follows a predefined path.
        </p>
        <img src="image/iplauction.png">
       <a href="ipl auction.html" target="_blank"> <button class="register">REGISTER NOW</button></a>



    </div>



    <!--moving particles-->
    <div class="particles">
        <script>

            const canvas = document.getElementById("particles");
            const ctx = canvas.getContext("2d");

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            let particlesArray = [];

            class Particle {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.size = Math.random() * 3;
                    this.speedX = (Math.random() - 0.5) * 1;
                    this.speedY = (Math.random() - 0.5) * 1;

                    const colors = ["#ff003c", "#00f7ff", "#00ff9d", "#ff00ff"];
                    this.color = colors[Math.floor(Math.random() * colors.length)];
                }

                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;

                    if (this.x > canvas.width || this.x < 0) {
                        this.speedX *= -1;
                    }

                    if (this.y > canvas.height || this.y < 0) {
                        this.speedY *= -1;
                    }
                }

                draw() {

                    ctx.fillStyle = "#ff3b5c";
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            function init() {
                for (let i = 0; i < 100; i++) {
                    particlesArray.push(new Particle());
                }
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                particlesArray.forEach(particle => {
                    particle.update();
                    particle.draw();
                });

                requestAnimationFrame(animate);
            }

            init();
            animate();

        </script>
    </div>
</body>

</html>
